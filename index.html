<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Team Org Chart</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #F4F4F4;
    --surface: #FFFFFF;
    --ink: #2D2D2D;
    --ink-soft: #6B6B6B;
    --ink-faint: #A8A8A8;
    --accent: #4A90E2;
    --hair: #E6E6E6;
    --grid: #ECECEC;
    --line-color: #C9C9C9;
    --line-weight: 1px;
    --line-style: solid;
    --shadow-1: 0 1px 2px rgba(20,20,30,.04), 0 2px 8px rgba(20,20,30,.06);
    --shadow-2: 0 4px 14px rgba(20,20,30,.10), 0 12px 32px rgba(20,20,30,.10);
    --node-w: 200px;
    --node-pad: 18px;
    --gap-h: 26px;
    --gap-v: 56px;
    --r-card: 4px;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    background: var(--bg);
    color: var(--ink);
    font: 14px/1.45 "Inter", -apple-system, "Helvetica Neue", Arial, sans-serif;
    font-feature-settings: "ss01","cv11";
    -webkit-font-smoothing: antialiased;
    overflow:hidden;
  }

  /* faint architectural grid background */
  body::before{
    content:"";
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(to right, var(--grid) 1px, transparent 1px),
      linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    opacity: .55;
  }

  /* ───────── top bar ───────── */
  .topbar{
    position: relative; z-index: 5;
    display:flex; align-items:center; justify-content:space-between;
    padding: 18px 28px 14px;
    border-bottom: 1px solid var(--hair);
    background: rgba(244,244,244,.85);
    backdrop-filter: blur(8px);
  }
  .brand{display:flex; align-items:center; gap:14px}
  .brand-mark{
    width:28px; height:28px; border-radius:3px;
    background: var(--ink);
    display:grid; place-items:center;
    color:#fff;
    font: 600 11px/1 "JetBrains Mono", ui-monospace, monospace;
    letter-spacing: .04em;
  }
  .brand-title{
    font-weight: 600; font-size: 15px; letter-spacing: -0.01em;
  }
  .brand-sub{
    font: 500 10.5px/1 "JetBrains Mono", ui-monospace, monospace;
    color: var(--ink-faint); text-transform: uppercase; letter-spacing: .12em;
    margin-top: 4px;
  }
  .topbar-right{display:flex; align-items:center; gap:10px}
  .meta-pill{
    font: 500 11px/1 "JetBrains Mono", ui-monospace, monospace;
    color: var(--ink-soft);
    padding: 6px 10px; border:1px solid var(--hair); border-radius: 2px;
    background:#fff;
    letter-spacing: .04em;
  }
  .meta-pill b{color: var(--ink); font-weight:600}

  .btn{
    appearance:none; cursor:default; user-select:none;
    border:1px solid var(--hair);
    background:#fff; color: var(--ink);
    padding: 7px 12px; border-radius: 3px;
    font: 500 12px/1 "Inter", sans-serif;
    display:inline-flex; align-items:center; gap:6px;
    transition: background .12s, border-color .12s, transform .04s;
  }
  .btn:hover{background:#FAFAFA; border-color:#D6D6D6}
  .btn:active{transform: translateY(0.5px)}
  .btn-primary{
    background: var(--ink); color:#fff; border-color: var(--ink);
  }
  .btn-primary:hover{background:#000; border-color:#000}
  .btn-danger{
    background:#fff; color:#C0392B; border-color:#F1D6D2;
  }
  .btn-danger:hover{background:#FBF1F0}
  .btn-ghost{ background:transparent; border-color: transparent; color: var(--ink-soft) }
  .btn-ghost:hover{background: rgba(0,0,0,.04); color: var(--ink)}

  /* ───────── canvas ───────── */
  .canvas{
    position: relative; z-index: 1;
    height: calc(100vh - 65px);
    overflow:auto;
  }
  .canvas-inner{
    min-width: 100%;
    padding: 56px 48px 80px;
    display:flex; justify-content:center;
  }

  /* ───────── tree (CSS connector lines) ───────── */
  .tree, .tree ul{ list-style:none; padding:0; margin:0 }
  .tree{ display:inline-block; text-align:center }
  .tree ul{
    display:flex; justify-content:center; position:relative;
    padding-top: var(--gap-v);
  }
  .tree li{
    position:relative;
    padding: var(--gap-v) calc(var(--gap-h)/2) 0;
    text-align:center;
  }
  /* connector lines */
  .tree li::before, .tree li::after{
    content:""; position:absolute; top:0; right:50%;
    width:50%; height: calc(var(--gap-v) / 2);
    border-top: var(--line-weight) var(--line-style) var(--line-color);
  }
  .tree li::after{ left:50%; right:auto;
    border-left: var(--line-weight) var(--line-style) var(--line-color); }
  .tree li:only-child{ padding-top: var(--gap-v); }
  .tree li:only-child::before, .tree li:only-child::after{
    display:block; right:auto; left:50%; width:0;
    border-top:0; border-left: var(--line-weight) var(--line-style) var(--line-color);
  }
  .tree li:first-child::before, .tree li:last-child::after{ border: 0 }
  .tree li:last-child::before{ border-right: var(--line-weight) var(--line-style) var(--line-color) }
  .tree li:first-child::after{ border-left: var(--line-weight) var(--line-style) var(--line-color) }
  /* root row — no parent connectors */
  .tree > li{ padding-top: 0 }
  .tree > li::before, .tree > li::after{ display:none !important }
  .tree > li:only-child{ padding-top: 0 }
  .tree > li:only-child::before, .tree > li:only-child::after{ display:none !important }
  /* vertical stem from each parent card down to its children's horizontal bar */
  .tree li > ul::before{
    content:""; position:absolute; top:0; left:50%;
    width:0; height: var(--gap-v);
    border-left: var(--line-weight) var(--line-style) var(--line-color);
  }
  /* root has no parent line above */
  .tree > li > .node{ margin-top: 0 }

  /* ───────── node card ───────── */
  .node{
    position: relative;
    display:inline-flex; flex-direction:column; align-items:center;
    width: var(--node-w);
    background: var(--surface);
    border-radius: var(--r-card);
    box-shadow: var(--shadow-1);
    padding: 22px var(--node-pad) 16px;
    border: 1px solid var(--hair);
    border-top: 3px solid var(--accent);
    text-align:center;
    transition: box-shadow .18s ease, transform .18s ease, border-color .18s ease, opacity .18s ease, background .18s ease;
    cursor: grab;
  }
  .node:active{ cursor: grabbing }
  .node:hover{
    box-shadow: var(--shadow-2);
    transform: translateY(-1px);
  }
  .node:hover .node-edit{ opacity: 1; transform: translateY(0) }

  /* drag-and-drop states */
  .node.is-dragging{
    opacity: .38;
    cursor: grabbing;
    transform: scale(.98);
    box-shadow: var(--shadow-1);
  }
  .node.drop-target{
    border-color: var(--accent) !important;
    background: rgba(74,144,226,.06);
    box-shadow: 0 0 0 2px var(--accent), var(--shadow-2);
    transform: translateY(-1px) scale(1.01);
  }
  .node.drop-target::before{
    content: "↳ Report to here";
    position: absolute; top: -26px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #fff;
    font: 500 10px/1 "JetBrains Mono", monospace;
    padding: 5px 8px; border-radius: 2px;
    letter-spacing: .04em; white-space: nowrap;
    pointer-events: none;
  }
  .node.drop-invalid{
    opacity: .35;
    cursor: not-allowed;
  }
  body.is-dragging .node{ cursor: grabbing }
  body.is-dragging .node:not(.is-dragging):not(.drop-invalid){
    outline: 1px dashed rgba(74,144,226,.4);
    outline-offset: 3px;
  }

  /* root-drop zone — drop here to make a person the top of the org */
  .root-drop{
    display:none;
    position: fixed; top: 124px; left: 50%; transform: translateX(-50%);
    z-index: 50;
    padding: 10px 18px;
    background: rgba(255,255,255,.96);
    border: 1px dashed var(--ink-faint);
    border-radius: 3px;
    font: 500 11px/1 "JetBrains Mono", monospace;
    color: var(--ink-soft);
    letter-spacing: .06em; text-transform: uppercase;
    backdrop-filter: blur(6px);
    box-shadow: 0 6px 18px rgba(0,0,0,.08);
  }
  body.is-dragging .root-drop{ display: block }
  .root-drop.over{
    background: var(--ink); color: #fff; border-color: var(--ink);
    box-shadow: 0 8px 22px rgba(0,0,0,.18);
  }

  .node-edit{
    position:absolute; top:8px; right:8px;
    width:22px; height:22px; border-radius:2px;
    display:grid; place-items:center;
    background: rgba(74,144,226,.08); color: var(--accent);
    border: 1px solid rgba(74,144,226,.2);
    opacity: 0; transform: translateY(-2px);
    transition: opacity .18s, transform .18s, background .12s;
  }
  .node-edit:hover{ background: rgba(74,144,226,.18) }
  .node-edit svg{width:11px; height:11px}

  .node-id{
    position:absolute; top:10px; left:10px;
    font: 500 9px/1 "JetBrains Mono", monospace;
    color: var(--ink-faint);
    letter-spacing: .08em;
  }

  .avatar{
    width:60px; height:60px; border-radius:50%;
    background: #F0F0F0;
    border: 1px solid var(--hair);
    overflow:hidden;
    display:grid; place-items:center;
    color: var(--ink-soft);
    font: 600 18px/1 "Inter", sans-serif;
    margin-bottom: 12px;
    flex-shrink:0;
  }
  .avatar img{ width:100%; height:100%; object-fit:cover; display:block }

  .node-name{
    font-size: 16px; font-weight: 700; line-height: 1.2;
    color: var(--ink); letter-spacing: -0.01em;
    margin: 0;
  }
  .node-role{
    font-size: 14px; font-weight: 400; line-height: 1.3;
    color: var(--ink-soft);
    margin: 4px 0 0;
  }
  .node-email{
    font: 400 11px/1.3 "JetBrains Mono", monospace;
    color: var(--ink-faint);
    margin-top: 8px;
    word-break: break-all;
  }
  .tags{
    display:flex; flex-wrap:wrap; gap:5px; justify-content:center;
    margin-top: 12px;
  }
  .tag{
    font: 500 10px/1 "JetBrains Mono", monospace;
    color: var(--ink-soft);
    background: #F4F4F4;
    padding: 4px 7px;
    border-radius: 2px;
    border: 1px solid var(--hair);
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .tag.accent{
    color: var(--accent);
    border-color: rgba(74,144,226,.25);
    background: rgba(74,144,226,.06);
  }

  .level-badge{
    position:absolute; bottom:-8px; left:50%; transform:translateX(-50%);
    background:#fff; border:1px solid var(--hair);
    font: 500 9px/1 "JetBrains Mono", monospace;
    color: var(--ink-faint);
    padding: 3px 6px; border-radius: 2px;
    letter-spacing: .08em;
  }

  /* compact density */
  .density-compact .node{ padding: 16px 14px 12px; width: 168px }
  .density-compact .avatar{ width:48px; height:48px; margin-bottom: 8px }
  .density-compact .node-name{ font-size:14px }
  .density-compact .node-role{ font-size:12px; margin-top: 2px }
  .density-compact .tags{ margin-top: 8px }

  /* horizontal layout */
  .layout-horizontal .tree{ display:flex; flex-direction:row; align-items:flex-start }
  /* (the spec leans on the vertical/architectural tree, so horizontal is just a tweak) */

  /* ───────── modal ───────── */
  .modal-backdrop{
    position:fixed; inset:0; z-index:100;
    background: rgba(15,15,20,.32);
    backdrop-filter: blur(2px);
    display:grid; place-items:center;
    animation: fade .18s ease;
  }
  @keyframes fade{ from{opacity:0} to{opacity:1} }
  @keyframes pop{ from{opacity:0; transform: translateY(8px) scale(.98)} to{opacity:1; transform:none} }

  .modal{
    width: 440px; max-width: calc(100vw - 32px);
    max-height: calc(100vh - 64px);
    background:#fff; border-radius: 6px;
    box-shadow: 0 30px 80px rgba(20,20,30,.25), 0 8px 24px rgba(20,20,30,.12);
    border:1px solid var(--hair);
    overflow:hidden;
    animation: pop .22s cubic-bezier(.2,.7,.3,1);
    display:flex; flex-direction:column;
  }
  .modal-hd{
    display:flex; align-items:center; justify-content:space-between;
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--hair);
  }
  .modal-hd h2{
    margin:0; font-size: 15px; font-weight: 600; letter-spacing:-0.01em;
  }
  .modal-hd .sub{
    font: 500 10px/1 "JetBrains Mono", monospace;
    color: var(--ink-faint);
    text-transform: uppercase; letter-spacing: .1em;
    margin-top: 4px;
  }
  .modal-x{
    width:28px; height:28px; border-radius:3px;
    border:1px solid transparent; background:transparent;
    color: var(--ink-soft); cursor:default;
    display:grid; place-items:center;
  }
  .modal-x:hover{ background: rgba(0,0,0,.05); color: var(--ink) }

  .modal-body{
    padding: 18px 20px 6px;
    overflow-y:auto; flex:1;
  }
  .modal-ft{
    padding: 14px 20px;
    border-top: 1px solid var(--hair);
    display:flex; align-items:center; justify-content:space-between;
    background: #FAFAFA;
  }

  .avatar-row{
    display:flex; align-items:center; gap:14px; margin-bottom: 18px;
  }
  .avatar-row .avatar{
    margin: 0;
    width: 72px; height: 72px;
    font-size: 22px;
  }
  .avatar-actions{display:flex; flex-direction:column; gap:6px}
  .avatar-actions .hint{
    font: 400 11px/1.3 "JetBrains Mono", monospace;
    color: var(--ink-faint);
  }

  .field{ display:flex; flex-direction:column; gap:6px; margin-bottom: 14px }
  .field label{
    font: 500 10px/1 "JetBrains Mono", monospace;
    color: var(--ink-soft);
    text-transform: uppercase; letter-spacing: .1em;
  }
  .field input, .field select{
    width:100%; box-sizing:border-box;
    padding: 9px 11px;
    font: 400 13px/1.3 "Inter", sans-serif;
    color: var(--ink);
    background:#fff;
    border:1px solid var(--hair);
    border-radius: 3px;
    transition: border-color .12s, box-shadow .12s;
    outline:none;
  }
  .field input:focus, .field select:focus{
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(74,144,226,.12);
  }

  .chips-editor{
    display:flex; flex-wrap:wrap; gap:5px;
    padding: 7px;
    border:1px solid var(--hair);
    border-radius: 3px;
    background:#fff; min-height: 40px;
    align-items: center;
  }
  .chips-editor:focus-within{
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(74,144,226,.12);
  }
  .chips-editor .tag{
    display:inline-flex; align-items:center; gap:5px;
    background: rgba(74,144,226,.08);
    color: var(--accent);
    border-color: rgba(74,144,226,.25);
  }
  .chips-editor .tag button{
    appearance:none; border:0; background:transparent;
    color: var(--accent); cursor: default;
    font-size:11px; padding: 0; line-height:1;
    opacity: .6;
  }
  .chips-editor .tag button:hover{opacity:1}
  .chips-editor input{
    border:0; outline:none; flex:1; min-width: 80px;
    padding: 4px;
    font: 400 12px/1.3 "Inter", sans-serif;
    background:transparent;
  }

  /* ───────── stats strip ───────── */
  .stats{
    display:flex; gap:24px;
    padding: 14px 28px;
    background: #fff;
    border-bottom: 1px solid var(--hair);
    position: relative; z-index: 4;
  }
  .stat{display:flex; flex-direction:column; gap:2px}
  .stat .num{ font: 600 18px/1 "Inter", sans-serif; letter-spacing:-0.02em }
  .stat .lbl{ font: 500 10px/1 "JetBrains Mono", monospace; color: var(--ink-faint); text-transform: uppercase; letter-spacing: .1em }

  /* ───────── helpers ───────── */
  .hidden{ display:none !important }
  .visually-hidden{ position:absolute; opacity:0; pointer-events:none; width:0; height:0 }

  /* ───────── print ───────── */
  @media print {
    body { overflow: visible !important; background: #fff !important; }
    body::before { display: none !important; }
    .topbar { display: none !important; }
    .stats { display: none !important; }
    .canvas {
      height: auto !important;
      overflow: visible !important;
    }
    .canvas-inner { padding: 32px 24px !important; }
    .node-edit { display: none !important; }
    .level-badge { display: none !important; }
    .root-drop { display: none !important; }
    .toast { display: none !important; }
    .twk-panel { display: none !important; }
    .node { break-inside: avoid; cursor: default !important; }
    .node:hover { transform: none !important; box-shadow: var(--shadow-1) !important; }
  }

  /* scrollbar */
  .canvas::-webkit-scrollbar{ width:10px; height:10px }
  .canvas::-webkit-scrollbar-thumb{ background:#D9D9D9; border-radius:5px; border:2px solid var(--bg); background-clip: content-box }
  .canvas::-webkit-scrollbar-thumb:hover{ background:#BFBFBF; background-clip: content-box; border:2px solid var(--bg) }

  /* toast */
  .toast{
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
    background: var(--ink); color:#fff;
    padding: 10px 16px; border-radius: 3px;
    font: 500 12px/1 "Inter", sans-serif;
    z-index: 200; opacity: 0; pointer-events:none;
    transition: opacity .2s, transform .2s;
    box-shadow: 0 8px 24px rgba(0,0,0,.18);
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(-2px) }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="orgchart.jsx"></script>
</body>
</html>
